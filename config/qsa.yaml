# QSA application configuration.

# Base directory for generated reports. QSA writes dated reports under a
# YYYY/MM subtree of this path, e.g.
#   /mnt/aftdata/qsa/artifacts/2026/05/qsa_audit_20260527.md
# Nothing is written under the repo itself. The directory tree is created on
# demand. May start with ~ (expanded at load time).
artifacts_dir: /mnt/aftdata/qsa/artifacts

# Lower bound for "valid" event/article timestamps. Anything earlier is treated
# as garbage (covers the 0001-12-31 BC Finnhub case and similar).
min_valid_date: "2000-01-01"

# Future-date tolerance: how many days past today is allowed before a date is
# flagged as "future". Insider transaction dates and news publish dates should
# never be in the future.
future_date_tolerance_days: 1

# Staleness thresholds per cadence (days since most recent observation). A
# stream past its threshold is flagged "stale".
staleness_thresholds_days:
  daily:   5     # 1d cadence (allow weekend slack)
  weekly:  14    # 1w cadence
  monthly: 45    # 1m cadence
  quarterly: 130 # 1q cadence
  # FINRA short-interest reports settle ~24x/year (15th + end-of-month) and
  # publish ~T+8 business days later. A "fresh" record is therefore 8-14
  # days old by definition. Mirror MDC's no_data_alerting rule for
  # massive/short_interest (21/45) so QSA R006 doesn't fire on dates that
  # are within normal publication-lag distance.
  bi_monthly_lagged: 21

# Coverage tier thresholds against the MEF stock universe (305 symbols).
# Tables expected to be per-symbol broad use these tiers; tables that are
# inherently sparse (sec_enforcement, congress_trades, cfpb_complaints) get
# the `sparse_expected` tier and only get an INFO finding.
mef_coverage:
  warn_below_pct:     50
  critical_below_pct: 25

# R010 — OHLC price-bar integrity (quantitative). Scans the curated mart price
# tables for the AFT investable universe (stocks + ETFs) and flags impossible
# or implausible bars. Scope is restricted to shdb.v_investable_universe_active
# so the plausibility checks stay false-positive-free (the noise is all sub-$5
# micro-caps, none of which are in the AFT universe).
#   - ordering invariant + dropped-digit low  -> critical (cron-gating)
#   - high spike / wide intraday range         -> warning  (often real volatility)
# `targets` lists the tables to scan; add the silver *_price_1d tables here to
# extend coverage without code changes.
ohlc_integrity:
  targets:
    - table: mart.stock_equity_daily
      asset_type: stock
    - table: mart.stock_etf_daily
      asset_type: etf
  low_factor:   0.5   # low  < low_factor  * min(open,close) -> dropped-digit low (critical)
  high_factor:  2.0   # high > high_factor * max(open,close) -> high spike (warning)
  range_factor: 2.0   # high / low > range_factor            -> wide intraday range (warning)
  max_samples:  25    # cap sample rows per finding

# Tables explicitly marked as deprecated. Reported with a warning regardless
# of content; consumer-grep walks AFT repos to surface live consumers.
deprecated_tables:
  - schema: shdb
    table:  insider_activity_signals
    replacement: shdb.insider_conviction_signals
    reason: "Legacy/contaminated — mixes grants with conviction transactions."

  # Finnhub-derived tables — provider RETIRED 2026-05-03 (config/providers/
  # finnhub_news.yaml in MDC). Listed here so R006 staleness and R008
  # coverage rules treat them as legacy, not as broken active sources.
  - schema: masd
    table:  finnhub_news_articles
    replacement: alphavantage_news_sentiment_1d / news_av_ticker_sentiment
    reason: "RETIRED 2026-05-03 — Finnhub provider retired; news superseded by AlphaVantage."
  - schema: masd
    table:  finnhub_news_article_symbols
    replacement: news_av_ticker_sentiment
    reason: "RETIRED 2026-05-03 — Finnhub provider retired."
  - schema: masd
    table:  finnhub_stocks_insider_txn
    replacement: fmp_stocks_insider_trades / sec_edgar_filing_events (Form 4)
    reason: "RETIRED 2026-05-03 — Finnhub provider retired; insider data superseded by FMP + SEC EDGAR."
  - schema: masd
    table:  finnhub_stocks_insider_mspr_1m
    replacement: insider_conviction_signals
    reason: "RETIRED 2026-05-03 — Finnhub MSPR retired; smooth proxy derivable from insider_conviction_signals."
  - schema: shdb
    table:  insider_mspr_1m
    replacement: insider_conviction_signals
    reason: "RETIRED 2026-05-03 — built from frozen Finnhub MSPR; no live consumers."
  - schema: shdb
    table:  insider_mspr_signals
    replacement: insider_conviction_signals
    reason: "RETIRED 2026-05-03 — derived from frozen Finnhub MSPR."

# `qsa ccoption` — consolidated covered-call operations report. Optional block:
# the defaults below match where IRA Guard and cc2 write today, so this can be
# omitted entirely. Override only the `root`/`glob`/`label` you need to move.
# (The orchestration constants — 3x30s process backoff, 5s quiesce, 900s tool
# timeout — and the venv console-script paths live in src/qsa/ccoption.py.)
ccoption:
  sources:
    cc2:
      label: cc2 phase 2
      root:  /mnt/aftdata/cc2/artifacts
      glob:  "cc2_phase2_options_*.md"
    iraguard_ccoptions:
      label: IRA Guard ccoptions
      root:  /mnt/aftdata/iraguard/artifacts/ccoptions
      glob:  "ccoptions-*.md"
    iraguard_standing:
      label: IRA Guard standing
      root:  /mnt/aftdata/iraguard/artifacts/standing
      glob:  "iraguard-standing-*.md"

# Repos to grep for live consumers of deprecated tables.
consumer_grep_repos:
  - ~/repos/mef
  - ~/repos/ccw
  - ~/repos/cia
  - ~/repos/iraguard
  - ~/repos/rse
  - ~/repos/das
  - ~/repos/xpm
  - ~/repos/udc
